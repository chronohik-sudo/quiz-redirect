<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Watch Video & Start Quiz</title>
  <style>
    /* Blue Background */
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* White Card Container */
    .container {
      background-color: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      text-align: center;
      width: 90%;
      max-width: 800px;
    }

    h2 {
      color: #333;
      margin-top: 0;
    }

    /* Responsive Video Wrapper */
    .video-wrapper {
      position: relative;
      padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
      height: 0;
      overflow: hidden;
      margin: 20px 0;
      border-radius: 8px;
      background: #000;
    }

    .video-wrapper iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    /* Button Styling */
    button {
      padding: 14px 28px;
      font-size: 18px;
      background-color: #2c5364;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      width: 100%;
      max-width: 300px; /* Prevents button from getting too wide */
      transition: background-color 0.3s;
    }

    button:hover {
      background-color: #1a333d;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>📹 Safety Training: Struck-By Hazards</h2>
    <p>Please watch the video below completely before proceeding.</p>

    <!-- Responsive Video Embed -->
    <div style="margin: 20px 0;">
  <a href="https://www.youtube.com/watch?v=WUaK6WZLAE8"
     target="_blank"
     style="display: inline-block; padding: 15px 30px; background-color: #ff0000; color: white; text-decoration: none; border-radius: 8px; font-weight: bold;">
     📹 Watch Video on YouTube
  </a>
  <p style="font-size: 14px; color: #666; margin-top: 10px;">
    (Click to open in a new tab)
  </p>
</div>

    <!-- Start Quiz Button -->
    <button onclick="startQuiz()">
      Start Quiz
    </button>
  </div>

  <script>
    function startQuiz() {
      // List of quiz links
      const quizzes = [
        "https://forms.office.com/r/uErqVt007N",
        "https://forms.office.com/r/RhD58pX4cT",
        "https://forms.office.com/r/sqrfcftNuB",
        "https://forms.office.com/r/23XWLT84sN"
      ];

      // Pick a random link
      const randomIndex = Math.floor(Math.random() * quizzes.length);
      const selectedQuiz = quizzes[randomIndex];

      // Redirect to the quiz
      window.location.href = selectedQuiz;
    }
  </script>

</body>
